<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cài đặt - Operation Hub</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body class="theme-dark">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-wrapper">
      <header class="topbar" id="topbar"></header>
      <main class="main-content">
        <div class="settings-layout">
          <aside class="card card-body">
            <a class="settings-nav-item active" href="#profile">Hồ sơ</a>
            <a class="settings-nav-item" href="#notifications">Thông báo</a>
            <a class="settings-nav-item" href="#system">Hệ thống</a>
          </aside>
          <section class="card card-body">
            <div class="settings-section" id="profile">
              <h3>Hồ sơ người dùng</h3>
              <div class="settings-row"><div><div class="settings-row-label" id="settingsName"></div><div class="settings-row-desc" id="settingsRole"></div></div><span class="badge badge-info">Đang hoạt động</span></div>
              <div class="settings-row"><div><div class="settings-row-label">Đơn vị</div><div class="settings-row-desc" id="settingsDepartment"></div></div></div>
            </div>
            <div class="settings-section" id="notifications">
              <h3>Thông báo</h3>
              <div class="settings-row"><div><div class="settings-row-label">Cảnh báo khẩn cấp</div><div class="settings-row-desc">Nhận thông báo khi có rủi ro cao</div></div><div class="toggle active"></div></div>
              <div class="settings-row"><div><div class="settings-row-label">Tin nhắn nội bộ</div><div class="settings-row-desc">Hiện badge khi có tin chưa đọc</div></div><div class="toggle active"></div></div>
            </div>
            <div class="settings-section" id="system">
              <h3>Hệ thống</h3>
              <div class="settings-row"><div><div class="settings-row-label">Đồng bộ dữ liệu demo</div><div class="settings-row-desc">Khởi tạo lại dữ liệu mẫu trong localStorage</div></div><button class="btn btn-sm btn-secondary" id="resetDemoData">Khởi tạo lại</button></div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
