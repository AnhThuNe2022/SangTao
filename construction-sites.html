<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Công trường - Operation Hub</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body class="theme-dark">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-wrapper">
      <header class="topbar" id="topbar"></header>
      <main class="main-content">
        <div class="page-header">
          <div>
            <h1>Danh sách Công trường</h1>
            <p class="page-header-desc">Giám sát trạng thái và tiến độ tại các công trường</p>
          </div>
        </div>
        <div class="site-grid" id="siteGrid"></div>
      </main>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.requireAuth()) return;
      Storage.init();
      Layout.render('construction-sites', { pageTitle: 'Công trường' });

      const statusMap = {
        active: { label: 'Đang thi công', color: '#52c41a' },
        warning: { label: 'Cảnh báo', color: '#ffa940' },
        critical: { label: 'Nguy hiểm', color: '#ff4d4f' },
        completed: { label: 'Hoàn thành', color: '#0078d4' }
      };

      document.getElementById('siteGrid').innerHTML = MOCK_DATA.constructionSites.map(s => {
        const st = statusMap[s.status] || statusMap.active;
        const progressColor = s.progress >= 80 ? 'green' : s.progress >= 50 ? 'blue' : 'orange';
        return `
          <div class="site-card">
            <div class="site-card-status">
              <div class="site-status-dot" style="background:${st.color}"></div>
              ${st.label}
            </div>
            <div class="site-card-name">${s.name}</div>
            <div class="site-card-info">📁 ${s.project}</div>
            <div class="site-card-info" style="margin-top:4px">👷 ${s.workers} công nhân · 👤 ${s.manager}</div>
            <div class="progress-item" style="margin-top:16px">
              <div class="progress-item-header">
                <span class="progress-item-name">Tiến độ</span>
                <span class="progress-item-value">${s.progress}%</span>
              </div>
              <div class="progress-bar"><div class="progress-fill ${progressColor}" style="width:${s.progress}%"></div></div>
            </div>
          </div>`;
      }).join('');
    });
  </script>
</body>
</html>
