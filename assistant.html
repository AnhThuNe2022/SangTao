<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant - Operation Hub</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body class="theme-dark">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-wrapper">  
      <header class="topbar" id="topbar"></header>
      <main class="main-content" style="padding:0">
        <div class="assistant-layout">
          <aside class="assistant-sidebar">
            <button class="btn btn-primary assistant-new-chat" id="newAssistantChat">Cuộc trò chuyện mới</button>
            <div class="chat-section-label">Lịch sử</div>
            <div class="assistant-history-item active">Vết nứt bê tông hầm Cù Mông</div>
            <div class="assistant-history-item">Biện pháp an toàn lao động</div>
            <div class="assistant-history-item">Dự báo tiến độ cầu</div>
          </aside>
          <section class="assistant-main">
            <div class="assistant-messages" id="assistantMessages"></div>
            <div class="assistant-input-area">
              <div class="assistant-input-wrapper">
                <textarea id="assistantInput" rows="1" placeholder="Nhập câu hỏi cho AI Assistant..."></textarea>
                <button class="chat-send-btn" id="assistantSend" type="button"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
  <script src="js/assistant.js"></script>
</body>
</html>
