<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Operation Hub</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="theme-dark dashboard-page">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-wrapper">
      <header class="topbar" id="topbar"></header>
      <main class="main-content dashboard-control" id="dashboardContent">
        <section class="dashboard-hero">
          <div>
            <h1>Trung tâm điều hành công trường hợp nhất</h1>
            <p>Tổng quan toàn bộ dự án và công trường</p>
          </div>
          <div class="dashboard-filters">
            <label>
              <span>Ngày</span>
              <input type="date" value="2026-05-13">
            </label>
            <label>
              <span>Dự án</span>
              <select id="dashboardProjectFilter">
                <option value="all">Tất cả dự án</option>
              </select>
            </label>
          </div>
        </section>

        <section class="dashboard-kpi-grid" id="kpiGrid"></section>

        <section class="dashboard-main-grid">
          <article class="dashboard-panel map-panel">
            <div class="panel-header">
              <h2>Bản đồ công trường</h2>
            </div>
            <div class="map-container" id="projectMap"></div>
          </article>

          <article class="dashboard-panel progress-panel">
            <div class="panel-header">
              <h2>Tiến độ dự án</h2>
            </div>
            <div class="progress-overview">
              <div class="progress-donut" id="progressDonut"></div>
              <div class="progress-legend" id="progressLegend"></div>
            </div>
            <div class="weekly-progress">
              <h3>Tiến độ trung bình theo tuần</h3>
              <div class="weekly-chart" id="weeklyProgressChart"></div>
            </div>
          </article>

          <article class="dashboard-panel alerts-panel">
            <div class="panel-header">
              <h2>Cảnh báo mới nhất</h2>
              <a href="warning.html">Xem tất cả</a>
            </div>
            <div class="alert-list" id="recentWarnings"></div>
          </article>

          <article class="dashboard-panel important-progress-panel">
            <div class="panel-header">
              <h2>Tiến độ dự án quan trọng</h2>
              <a href="projects.html">Xem tất cả</a>
            </div>
            <div class="project-progress-table" id="importantProjects"></div>
          </article>

          <article class="dashboard-panel activity-panel">
            <div class="panel-header">
              <h2>Hoạt động gần đây</h2>
            </div>
            <div class="dashboard-activity-list" id="activityFeed"></div>
          </article>

          <article class="dashboard-panel live-panel">
            <div class="panel-header">
              <h2>Hình ảnh trực tiếp từ công trường</h2>
              <a href="construction-sites.html">Xem tất cả</a>
            </div>
            <div class="live-grid" id="liveSites"></div>
          </article>
        </section>
      </main>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
