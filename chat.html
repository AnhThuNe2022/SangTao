<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Nội bộ - Operation Hub</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/chat.css">
</head>
<body class="theme-dark">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-wrapper">
      <header class="topbar" id="topbar"></header>
      <main class="main-content" style="padding:25px">
        <div class="chat-layout">
          <div class="chat-sidebar">
            <div class="chat-sidebar-header">
              <h3>Chat Nội bộ</h3>
              <div class="chat-search">
                <input type="text" placeholder="Tìm kiếm..." id="chatSearch">
              </div>
            </div>
            <div class="chat-channels" id="chatChannels"></div>
          </div>

          <div class="chat-main">
            <div class="chat-main-header">
              <div>
                <h2 id="chatChannelName"># bao-cao-hien-truong</h2>
                <span id="chatChannelDesc">Báo cáo hiện trường, xử lý sự cố và điều phối nhanh</span>
              </div>
              <div class="chat-header-actions">
                <button class="btn btn-sm btn-primary" id="toggleReportForm">Báo cáo</button>
                <button class="btn btn-sm btn-secondary" id="toggleInfo">Thông tin</button>
              </div>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
              <form class="chat-report-form" id="chatReportForm">
                <div class="chat-report-title">Tạo báo cáo hiện trường nhanh</div>
                <div class="chat-report-grid">
                  <label>Dự án
                    <select id="chatReportProject" required></select>
                  </label>
                  <label>Hạng mục
                    <select id="chatReportSite" required></select>
                  </label>
                  <label>Vị trí
                    <input id="chatReportLocation" placeholder="VD: Km 45+200">
                  </label>
                  <label>Mức độ
                    <select id="chatReportSeverity" required>
                      <option value="critical">Nguy hiểm</option>
                      <option value="high">Cảnh báo</option>
                      <option value="medium">Trung bình</option>
                      <option value="low">Bình thường</option>
                    </select>
                  </label>
                  <label class="chat-report-wide">Mô tả
                    <textarea id="chatReportDescription" placeholder="Mô tả nhanh tình trạng hiện trường..." required></textarea>
                  </label>
                </div>
              </form>
              <div class="chat-input-wrapper">
                <div class="chat-input-actions">
                  <button class="chat-input-action" title="Đính kèm ảnh" id="attachImage" type="button"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
                  <button class="chat-input-action" title="Đính kèm file" id="attachFile" type="button"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg></button>
                </div>
                <textarea placeholder="Nhập tin nhắn..." id="chatInput" rows="1"></textarea>
                <button class="chat-send-btn" id="chatSend" type="button"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
              </div>
            </div>
          </div>

          <div class="chat-info-panel" id="chatInfoPanel">
            <!-- <h3>Thông tin báo cáo</h3>
            <div class="chat-info-field"><div class="chat-info-label">Mã báo cáo</div><div class="chat-info-value">BC-2026-0713-001</div></div>
            <div class="chat-info-field"><div class="chat-info-label">Dự án</div><div class="chat-info-value">Cao tốc Bắc - Nam Phía Đông</div></div>
            <div class="chat-info-field"><div class="chat-info-label">Hạng mục</div><div class="chat-info-value">Hầm Cù Mông</div></div>
            <div class="chat-info-field"><div class="chat-info-label">Vị trí</div><div class="chat-info-value">Km 45+200 - Nhánh trái</div></div>
            <div class="chat-info-field"><div class="chat-info-label">Thời gian</div><div class="chat-info-value">13/07/2026 09:15</div></div>
            <div class="chat-info-field"><div class="chat-info-label">Mức độ ảnh hưởng</div><div class="chat-info-value"><span class="badge badge-danger">Nguy hiểm</span></div></div>
            <div class="chat-info-field"><div class="chat-info-label">Trạng thái</div><div class="chat-info-value"><span class="badge badge-warning">Đang xử lý</span></div></div> -->
          </div>
        </div>
      </main>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*,.pdf,.doc,.docx" style="display:none">

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
